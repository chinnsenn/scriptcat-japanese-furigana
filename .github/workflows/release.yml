name: Verify and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Build and test
        run: npm run check

      - name: Verify generated userscript is committed
        run: git diff --exit-code -- outputs/japanese-furigana.user.js

      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"

      - name: Upload installable userscript
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: japanese-furigana-${{ github.ref_name }}
          path: outputs/japanese-furigana.user.js
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" outputs/japanese-furigana.user.js --clobber

